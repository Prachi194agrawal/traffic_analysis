name: traffic-analysis-ai

services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-traffic_analysis}
      POSTGRES_USER: ${POSTGRES_USER:-traffic_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-traffic_analysis}
      POSTGRES_USER: ${POSTGRES_USER:-traffic_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      ROOT_PATH: /api
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      HF_TOKEN: ${HF_TOKEN:-}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-15728640}
    volumes:
      - model_data:/app/models
      - upload_data:/app/uploads
      - output_data:/app/static/outputs
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: /api
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  model_data:
  upload_data:
  output_data:
